name: Universal AI Fixer

on:
  workflow_run:
    workflows: ["Build Horizon OC Zeus"]
    types:
      - completed
  issue_comment:
    types: [created]

jobs:
  fixer:
    runs-on: ubuntu-latest
    # Run if the build failed OR if someone comments "/fix" on a PR/Issue
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/fix'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Universal AI Fixer
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python scripts/universal_ai_fixer.py
