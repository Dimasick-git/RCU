name: Build Ryazha-CLK

on:
  push:
    branches: [ develop, main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Minimal devkitA64 container
    container:
      image: devkitpro/devkita64:20251231

    steps:
      - name: Checkout repository and submodules # needed for ryazha-clk
        uses: actions/checkout@v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0


      # -------------------------------------------------
      # Fix PATH for devkitA64 and devkitARM
      # -------------------------------------------------
      - name: Set devkitPro PATH
        run: |
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITA64=/opt/devkitpro/devkitA64" >> $GITHUB_ENV
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV
          echo "PATH=/opt/devkitpro/devkitA64/bin:/opt/devkitpro/devkitARM/bin:$PATH" >> $GITHUB_ENV
        shell: bash

      - name: Check devkitPro gcc and g++ versions
        run: |
          aarch64-none-elf-gcc --version
          aarch64-none-elf-g++ --version
        shell: bash # is this even needed? but for consistency let's keep using it

      - name: Install ccache
        run: |
          apt-get update
          apt-get install -y ccache
        shell: bash

      # -------------------------------------------------
      # Get short commit SHA & prepare root dist/
      # -------------------------------------------------
      - name: Set commit SHA & dist
        id: vars
        shell: bash
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "DIST_DIR=$GITHUB_WORKSPACE/dist" >> $GITHUB_ENV
          mkdir -p "$GITHUB_WORKSPACE/dist/atmosphere/kips"
          mkdir -p "$GITHUB_WORKSPACE/dist/atmosphere/contents"
          mkdir -p "$GITHUB_WORKSPACE/dist/switch/.overlays"
          mkdir -p "$GITHUB_WORKSPACE/dist/switch/overlays"
          mkdir -p "$GITHUB_WORKSPACE/dist/config/ryazha-clk"
          echo $SHORT_SHA > "$GITHUB_WORKSPACE/dist/.commit"
          echo $GITHUB_SHA >> "$GITHUB_WORKSPACE/dist/.commit"

      - name: Clone Libnx
        run: git clone https://github.com/switchbrew/libnx.git

      - name: Clone Atmosphere
        shell: bash
        run: git clone --depth=1 --single-branch https://github.com/Atmosphere-NX/Atmosphere.git atmosphere -b $(cat ams_ver.txt | tr -d '\r\n')

      - name: Prepare build folder
        run: |
          mkdir -p build
          cp -r atmosphere/* build/

      - name: Override ldr_process_creation.cpp
        run: |
          cp -rf Source/Atmosphere/stratosphere/loader/source/* build/stratosphere/loader/source/

      - name: Cache ccache
        uses: actions/cache@v5.0.3
        with:
          path: /root/.cache/ccache
          key: ccache-${{ runner.os }}-devkitpro-ams-${{ hashFiles('ams_ver.txt') }} # last key was utter garbage, stick to ams versions, 
          restore-keys: |
            ccache-${{ runner.os }}-devkitpro-

      - name: Configure ccache
        run: |
          export CCACHE_DIR=/root/.cache/ccache
          echo "CCACHE_DIR=/root/.cache/ccache" >> $GITHUB_ENV
          ccache --set-config=max_size=10G
          ccache --set-config=compiler_check=content
          ccache --zero-stats

      - name: Build Libnx
        shell: bash
        run: |
          export CC="ccache aarch64-none-elf-gcc"
          export CXX="ccache aarch64-none-elf-g++"
          pushd libnx
          make -j$(($(nproc) * 4)) install CXX="ccache aarch64-none-elf-g++" CC="ccache aarch64-none-elf-gcc"
          popd

      - name: Build ryazha-clk sysmodule and overlay
        shell: bash
        run: |
          export CC="ccache aarch64-none-elf-gcc"
          export CXX="ccache aarch64-none-elf-g++"

          ROOT_DIR="$GITHUB_WORKSPACE/Source/ryazha-clk"
          DIST_DIR="$GITHUB_WORKSPACE/dist"

          echo "*** sysmodule ***"

          TITLE_ID="$(grep -oP '"title_id":\s*"0x\K(\w+)' \
            "$ROOT_DIR/sysmodule/perms.json")"

          echo "TITLE_ID: $TITLE_ID"

          pushd "$ROOT_DIR/sysmodule"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          make -j$(($(nproc) * 2)) CXX="ccache aarch64-none-elf-g++" CC="ccache aarch64-none-elf-gcc"
          popd

          mkdir -p "$DIST_DIR/atmosphere/contents/$TITLE_ID/flags"

          cp -vf \
            "$ROOT_DIR/sysmodule/out/ryazha-clk.nsp" \
            "$DIST_DIR/atmosphere/contents/$TITLE_ID/exefs.nsp"

          : >"$DIST_DIR/atmosphere/contents/$TITLE_ID/flags/boot2.flag"

          cp -vf \
            "$ROOT_DIR/sysmodule/toolbox.json" \
            "$DIST_DIR/atmosphere/contents/$TITLE_ID/toolbox.json"

          echo "*** overlay ***"

          pushd "$ROOT_DIR/overlay"
          make -j$(($(nproc) * 2)) CXX="ccache aarch64-none-elf-g++" CC="ccache aarch64-none-elf-gcc"
          popd

          mkdir -p "$DIST_DIR/switch/.overlays"

          cp -vf \
            "$ROOT_DIR/overlay/out/ryazha-clk.ovl" \
            "$DIST_DIR/switch/.overlays/ryazha-clk.ovl"

          echo "*** assets ***"

          mkdir -p "$DIST_DIR/config/ryazha-clk"
          mkdir -p "$DIST_DIR/config/ryazha-clk/lang"

          cp -vf \
            "$ROOT_DIR/config.ini.template" \
            "$DIST_DIR/config/ryazha-clk/config.ini.template"

          # Bundle overlay language files so i18n::Initialize() finds them
          if [ -d "$ROOT_DIR/overlay/lang" ]; then
            cp -vf "$ROOT_DIR/overlay/lang/"*.json \
              "$DIST_DIR/config/ryazha-clk/lang/"
          fi

          cp -vf \
            "$ROOT_DIR/README.md" \
            "$DIST_DIR/README.md"

      # -------------------------------------------------
      # SaltyNX submodule build
      # -------------------------------------------------
      - name: Build SaltyNX
        shell: bash
        run: |
          export CC="ccache aarch64-none-elf-gcc"
          export CXX="ccache aarch64-none-elf-g++"
          DIST_DIR="$GITHUB_WORKSPACE/dist"

          if [ ! -d "Source/SaltyNX" ] || [ -z "$(ls -A Source/SaltyNX 2>/dev/null)" ]; then
            echo "::warning::Source/SaltyNX submodule is empty, initializing..."
            git submodule update --init --recursive Source/SaltyNX
          fi

          pushd Source/SaltyNX
          echo "*** Building SaltyNX ***"
          make -j$(($(nproc) * 2)) 2>&1
          popd

          # Pack sdcard_out -> dist/
          if [ -d "Source/SaltyNX/sdcard_out" ]; then
            echo "*** Packing SaltyNX artifacts ***"
            cp -rvf Source/SaltyNX/sdcard_out/. "$DIST_DIR/"
            echo "SaltyNX packed successfully"
          else
            echo "::error::SaltyNX sdcard_out/ not produced"
            exit 1
          fi

      # -------------------------------------------------
      # Ryazha-Status-Monitor submodule build
      # -------------------------------------------------
      - name: Build Ryazha-Status-Monitor
        shell: bash
        run: |
          export CC="ccache aarch64-none-elf-gcc"
          export CXX="ccache aarch64-none-elf-g++"
          DIST_DIR="$GITHUB_WORKSPACE/dist"

          if [ ! -d "Source/Ryazha-Status-Monitor" ] || [ -z "$(ls -A Source/Ryazha-Status-Monitor 2>/dev/null)" ]; then
            echo "::warning::Source/Ryazha-Status-Monitor submodule is empty, initializing..."
            git submodule update --init --recursive Source/Ryazha-Status-Monitor
          fi

          mkdir -p "$DIST_DIR/switch/.overlays"

          pushd Source/Ryazha-Status-Monitor

          # Try building from source first
          if [ -f "Makefile" ]; then
            echo "*** Building Ryazha-Status-Monitor from source ***"
            make clean 2>&1 || true
            make -j$(($(nproc) * 2)) 2>&1
          fi

          # Find the produced .ovl file (Makefile may put it in different locations)
          OVL_FILE=""
          for candidate in \
            "out/switch/.overlays/Ryazha-Status-Monitor.ovl" \
            "Ryazha-Status-Monitor.ovl" \
            "out/Ryazha-Status-Monitor.ovl"; do
            if [ -f "$candidate" ]; then
              OVL_FILE="$candidate"
              break
            fi
          done

          if [ -n "$OVL_FILE" ]; then
            echo "*** Packing Ryazha-Status-Monitor.ovl from $OVL_FILE ***"
            cp -vf "$OVL_FILE" "$DIST_DIR/switch/.overlays/Ryazha-Status-Monitor.ovl"
          else
            echo "::warning::Could not find Ryazha-Status-Monitor.ovl, skipping"
          fi

          popd

      - name: Build kip
        working-directory: build/stratosphere/loader
        shell: bash
        run: |
          export CC="ccache aarch64-none-elf-gcc"
          export CXX="ccache aarch64-none-elf-g++"
          make -j$(($(nproc) * 4)) CXX="ccache aarch64-none-elf-g++" CC="ccache aarch64-none-elf-gcc"
          # Финальное имя -- loader.kip: это историческая convention,
          # которую ожидает Hekate (kip1=atmosphere/kips/loader.kip) и
          # которой пользуются Switchcraft / hoc-clk / sys-clk-OC. На
          # clean install с rcu.kip патчи лоадера не подхватываются на
          # boot, и OC-настройки "не применяются" после reboot.
          hactool -t kip1 out/nintendo_nx_arm64_armv8a/release/loader.kip --uncompress=loader.kip
          mkdir -p "$GITHUB_WORKSPACE/dist/atmosphere/kips"
          cp loader.kip "$GITHUB_WORKSPACE/dist/atmosphere/kips/loader.kip"

      - name: ccache stats
        run: ccache --show-stats

      # -------------------------------------------------
      # Показать содержимое dist/ для отладки
      # -------------------------------------------------
      - name: Show dist tree
        shell: bash
        run: |
          echo "=== dist/ contents ==="
          find dist/ -type f | sort

      # -------------------------------------------------
      # Upload ZIP artifact
      # -------------------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ryazha-clk-dist
          path: dist/
          compression-level: 3
          include-hidden-files: true

      # -------------------------------------------------
      # Update dist folder in repository
      # -------------------------------------------------
      - name: Commit and Push dist
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # Удаляем старое содержимое dist в репозитории, если оно есть
          rm -rf dist_repo
          git clone --depth 1 --branch ${{ github.ref_name }} https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} dist_repo
          cd dist_repo
          rm -rf dist/*
          mkdir -p dist
          cp -rvf ../dist/* dist/
          git add dist/
          if git diff --staged --quiet; then
            echo "No changes in dist"
          else
            git commit -m "Update dist files from build [skip ci]"
            git push origin ${{ github.ref_name }}
          fi
