name: Sync with Upstream
on:
  schedule:
    - cron: '0 0 * * *' # Запуск каждый день в полночь
  workflow_dispatch: # Возможность ручного запуска
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout RCU
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
      - name: Add Upstream
        run: |
          git remote add upstream https://github.com/Horizon-OC/Horizon-OC.git
          git fetch upstream
      - name: Merge Upstream
        run: |
          # Пытаемся объединить изменения из upstream/main в текущую ветку.
          # В случае конфликтов мы предпочитаем наши изменения для файлов в Source/hoc-clk,
          # так как это специфичные модификации RCU.
          if git merge upstream/main --no-edit --allow-unrelated-histories -X ours; then
            echo "Successfully merged upstream changes with 'ours' strategy for conflicts."
            git push origin main
          else
            echo "Conflict detected even with 'ours' strategy. Manual intervention required."
            git merge --abort
            exit 1
          fi
