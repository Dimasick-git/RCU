name: Sync with Upstream (Filtered)
on:
  schedule:
    - cron: '0 0 * * *' # Запуск каждый день в полночь
  workflow_dispatch: # Возможность ручного запуска

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout RCU
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Add Upstream
        run: |
          git remote add upstream https://github.com/Horizon-OC/Horizon-OC.git
          git fetch upstream main

      - name: Sync and Filter Commits
        run: |
          # Получаем список новых коммитов из upstream/main, которых нет в локальной ветке main
          NEW_COMMITS=$(git log main..upstream/main --oneline --format="%H" --reverse)
          
          if [ -z "$NEW_COMMITS" ]; then
            echo "No new commits to sync."
            exit 0
          fi

          for commit in $NEW_COMMITS; do
            COMMIT_MSG=$(git log -1 --format="%s" $commit)
            
            # Проверяем, содержит ли сообщение коммита запрещенные слова
            # Исключаем Ryazha-Авто и VRR
            if echo "$COMMIT_MSG" | grep -qiE "ryazha-авто|vrr"; then
              echo "Skipping commit $commit: $COMMIT_MSG (matches exclusion filter)"
              continue
            fi
            
            # Проверяем изменения в файлах на наличие VRR или Ryazha-Авто
            FILES_CHANGED=$(git show --name-only --format="" $commit)
            if echo "$FILES_CHANGED" | grep -qiE "vrr|ryazha-авто"; then
              echo "Skipping commit $commit: $COMMIT_MSG (contains excluded files)"
              continue
            fi
            
            echo "Applying commit $commit: $COMMIT_MSG"
            # Используем -X theirs для автоматического разрешения простых конфликтов в пользу апстрима, 
            # но фильтрация выше должна защитить наши кастомные части.
            if ! git cherry-pick $commit; then
              echo "Conflict detected for $commit. Attempting to resolve..."
              # Если конфликт не решается автоматически, пропускаем коммит (или можно настроить иначе)
              git cherry-pick --abort
              echo "Skipped $commit due to merge conflicts."
            fi
          done

      - name: Push Changes
        run: |
          git push origin main
